name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -q --tb=short

      - name: Run integration tests
        run: pytest tests/integration -q --tb=short

      - name: Run E2E tests (with harness gating)
        run: pytest tests/e2e -q --tb=short

      - name: Run type check (mypy)
        run: mypy src/openclaw_enhance

      - name: Run lint (ruff)
        run: ruff check src tests

      - name: Run format check (ruff)
        run: ruff format --check src tests

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run TypeScript tests
        run: npm test -- --runInBand

      - name: Run ESLint
        run: npm run lint

  install-smoke-test:
    name: Install/Uninstall Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke test - CLI help
        run: openclaw-enhance --help

      - name: Smoke test - Render skill
        run: openclaw-enhance render-skill oe-eta-estimator

      - name: Smoke test - Render workspace
        run: openclaw-enhance render-workspace oe-orchestrator

      - name: Smoke test - Render hook
        run: openclaw-enhance render-hook oe-subagent-spawn-enrich

      - name: Smoke test - Status command
        run: openclaw-enhance status

      - name: Smoke test - Status JSON output
        run: openclaw-enhance status --json | python -m json.tool

      - name: Uninstall smoke test
        run: |
          # Test uninstall in a clean environment
          openclaw-enhance uninstall --help

  workflow-validation:
    name: Validate CI Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          python -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml'))"
          echo "CI workflow YAML is valid"
